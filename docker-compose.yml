services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ledgerx_user
      POSTGRES_PASSWORD: ledgerx_pass
      POSTGRES_DB: ledgerx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerx_user -d ledgerx_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ledgerx_user:ledgerx_pass@db:5432/ledgerx_db
      API_KEY: ${API_KEY:-changeme}
    depends_on:
      db:
        condition: service_healthy
    stop_grace_period: 15s
    command: sh -c "node dist/db/migrate.js && node dist/db/seed.js && node dist/index.js"

volumes:
  postgres_data:
