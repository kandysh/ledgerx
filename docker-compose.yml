version: "3.8"

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledgerx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerx_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ledgerx_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ledgerx_user} -d ${POSTGRES_DB:-ledgerx_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ledgerx_user}:${POSTGRES_PASSWORD:-ledgerx_pass}@db:5432/${POSTGRES_DB:-ledgerx_db}
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    stop_grace_period: 15s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ledgerx_user}:${POSTGRES_PASSWORD:-ledgerx_pass}@db:5432/${POSTGRES_DB:-ledgerx_db}
    command: pnpm run db:migrate
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  postgres_data:
